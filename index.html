<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="./assets/images/logo.png" alt="logo">
        <h1>Character Counter</h1>
        <button>
            <img src="./assets/images/icon.png", alt="settings">
        </button>
    </header>
    <section class="hero">
        <h2>Analyze your text in real-time.</h2>
        <textarea placeholder="Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every ineteraction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly."></textarea>
        <div class="options">
            <input type="checkbox"> Exclude Spaces
            <input type="checkbox"> Set Character Limit
            <p>Approx. reading time: &lt;1 minute</p>
        </div>
        <div class="counter">
            <div class="total"> 
                <p>278</p>
                <p>Total Characters</p>
            </div>
            <div class="word"> 
                <p>39</p>
                <p>Word Count</p>
            </div>
            <div class="sentence"> 
                <p>04</p>
                <p>Sentences Count</p>
            </div>
        <div class="Letter Density">
            <h3>Letter Density</h3>
            <div class="estadistics">
                <input type="range"> E
                <p>40(16.06%)</p>
                <input type="range"> I
                <p>29(11.65%)</p>
                <input type="range"> T
                <p>28(11.24%)</p>
                <input type="range"> O
                <p>22(8.84%)</p>
                <input type="range"> N
                <p>21(8.43)</p>
            </div>
            <button>See more</button>
        </div>
    </section>
</body>
</html>
